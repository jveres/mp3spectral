<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>WebGL MP3 Visualizer</title>
<style>
  :root {
    --bg: #05060a;
    --panel: rgba(15, 18, 28, 0.55);
    --panel-border: rgba(255, 255, 255, 0.08);
    --text: #ffffff;
    --muted: rgba(255, 255, 255, 0.65);
    --accent: #7df9ff;
    --accent2: #ff5cc8;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }
  canvas#gl {
    position: fixed; inset: 0;
    width: 100%; height: 100%;
    display: block;
    z-index: 0;
  }
  .ui {
    position: fixed; inset: 0;
    z-index: 1;
    pointer-events: none;
    display: grid;
    grid-template-rows: auto 1fr auto;
    padding: 18px;
    gap: 12px;
  }
  .ui > * { pointer-events: auto; }
  /* Keep HUD text readable over any backdrop (Photos, light shaders, etc.) */
  .ui, .ui input, .ui button {
    text-shadow: 1px 1px 0 #000;
  }
  /* Drop the shadow on elements whose text already sits on a vivid gradient
     fill (gradient text, or solid dark text on bright gradient buttons) — the
     dark halo looks muddy / clipped against those backgrounds. */
  .brand,
  .btn.play,
  .btn.toggle.on,
  .file-btn { text-shadow: none; }

  body.idle { cursor: none; }
  .ui, .ui * { transition: opacity 400ms ease, transform 400ms ease; }
  body.idle .ui > header { opacity: 0; transform: translateY(-8px); pointer-events: none; }
  body.idle .ui > div:last-child { opacity: 0; transform: translateY(8px); pointer-events: none; }
  body.idle .ui > div:last-child * { pointer-events: none; }

  header {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px;
  }
  .brand {
    font-weight: 600; letter-spacing: 0.4px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; background-clip: text; color: transparent;
    font-size: 14px;
  }
  .hint { color: var(--muted); font-size: 12px; }
  .path-hud {
    flex: 1;
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    font-variant-numeric: tabular-nums;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    padding: 0 16px;
    min-width: 0;
  }
  .path-hud:empty { display: none; }

  .playlist {
    align-self: end;
    justify-self: start;
    width: min(360px, 92vw);
    max-height: 50vh;
    overflow: auto;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    backdrop-filter: blur(14px) saturate(140%);
    -webkit-backdrop-filter: blur(14px) saturate(140%);
    border-radius: 14px;
    padding: 8px;
  }
  .playlist h3 {
    margin: 6px 8px 8px;
    font-size: 11px; font-weight: 600;
    letter-spacing: 1.4px; text-transform: uppercase;
    color: var(--muted);
  }
  .track {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 13px;
    color: var(--text);
    transition: background 120ms;
  }
  .track:hover { background: rgba(255,255,255,0.05); }
  .track.active {
    background: linear-gradient(90deg, rgba(125,249,255,0.18), rgba(255,92,200,0.12));
  }
  .track .idx { color: var(--muted); font-variant-numeric: tabular-nums; width: 22px; }
  .track .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .track .dur { color: var(--muted); font-variant-numeric: tabular-nums; font-size: 12px; }
  .track button {
    background: none; border: 0; color: var(--muted); cursor: pointer;
    font-size: 14px; padding: 2px 4px; border-radius: 6px;
  }
  .track button:hover { color: #fff; background: rgba(255,255,255,0.08); }
  .track button.like.on { color: #ff5cc8; }
  .track button.like.on:hover { color: #ff8cdc; }

  .empty {
    color: var(--muted); text-align: center; padding: 16px 12px; font-size: 13px;
  }

  .player {
    align-self: end;
    width: 100%;
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 14px;
    padding: 12px 16px;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    backdrop-filter: blur(14px) saturate(140%);
    -webkit-backdrop-filter: blur(14px) saturate(140%);
    border-radius: 14px;
  }
  .controls { display: flex; align-items: center; gap: 6px; }
  .btn {
    appearance: none; border: 0; background: rgba(255,255,255,0.06);
    color: var(--text);
    width: 36px; height: 36px; border-radius: 50%;
    display: inline-grid; place-items: center;
    cursor: pointer; transition: background 120ms, transform 120ms;
  }
  .btn:hover { background: rgba(255,255,255,0.12); }
  .btn:active { transform: scale(0.96); }
  .btn.toggle.on {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #08101a;
  }
  .btn.play {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #08101a;
  }
  .btn svg { width: 16px; height: 16px; }
  .btn.play svg { width: 18px; height: 18px; }

  .scrub { display: grid; grid-template-columns: auto 1fr auto; gap: 10px; align-items: center; }
  .time { color: var(--muted); font-size: 12px; font-variant-numeric: tabular-nums; min-width: 38px; }
  .time.right { text-align: right; }
  .bar {
    appearance: none;
    width: 100%; height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 99px;
    outline: none;
    cursor: pointer;
  }
  .bar::-webkit-slider-thumb {
    appearance: none;
    width: 12px; height: 12px; border-radius: 50%;
    background: #fff; box-shadow: 0 0 0 4px rgba(125,249,255,0.18);
  }
  .bar::-moz-range-thumb {
    width: 12px; height: 12px; border-radius: 50%;
    background: #fff; border: 0;
  }

  .right { display: flex; align-items: center; gap: 10px; }
  .vol { width: 90px; }
  .now {
    max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    color: var(--muted); font-size: 12px;
  }

  .drop-overlay {
    position: fixed; inset: 0;
    background: rgba(5, 8, 18, 0.55);
    backdrop-filter: blur(6px);
    z-index: 5;
    display: grid; place-items: center;
    pointer-events: none;
    opacity: 0;
    transition: opacity 150ms;
  }
  .drop-overlay.show { opacity: 1; pointer-events: auto; }
  .drop-card {
    border: 2px dashed rgba(125,249,255,0.6);
    color: #fff;
    padding: 32px 44px;
    border-radius: 18px;
    font-size: 16px;
    background: rgba(15,18,28,0.6);
    box-shadow: 0 0 0 6px rgba(125,249,255,0.06);
  }

  .welcome {
    position: fixed; inset: 0;
    display: grid; place-items: center;
    z-index: 2;
    pointer-events: none;
    text-align: center;
  }
  .welcome.hidden { display: none; }
  .welcome-card {
    pointer-events: auto;
    padding: 30px 36px;
    border-radius: 18px;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    backdrop-filter: blur(18px) saturate(140%);
    -webkit-backdrop-filter: blur(18px) saturate(140%);
    max-width: 460px;
  }
  .welcome h1 {
    margin: 0 0 8px; font-size: 22px; font-weight: 600;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .welcome p { margin: 0 0 18px; color: var(--muted); font-size: 14px; line-height: 1.5; }
  .file-btn {
    appearance: none; border: 0; cursor: pointer;
    padding: 10px 18px; border-radius: 999px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #08101a; font-weight: 600; font-size: 13px;
    letter-spacing: 0.3px;
  }

  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 99px; }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://esm.sh/three@0.160.0",
    "three/addons/": "https://esm.sh/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body>
  <canvas id="gl"></canvas>
  <canvas id="trails" style="position:fixed;inset:0;width:100%;height:100%;display:none;z-index:0;"></canvas>

  <div class="welcome" id="welcome">
    <div class="welcome-card">
      <h1>WebGL MP3 Visualizer</h1>
      <p>Drop MP3 files anywhere on the page to build a playlist, or pick files manually. Audio plays locally — nothing is uploaded.</p>
      <button class="file-btn" id="pickBtn">Choose MP3 files</button>
    </div>
  </div>

  <div class="ui">
    <header>
      <div class="brand">▮▮ Spectral</div>
      <div class="path-hud" id="imgPath"></div>
      <div style="display:flex; align-items:center; gap:12px;">
        <div class="hint" id="hint" style="cursor:pointer; user-select:none;" title="Click to choose MP3 files">Drop .mp3 files anywhere</div>
        <button class="btn toggle" id="shuffle" title="Shuffle / random play" style="width:auto; padding:0 12px; border-radius:18px; font-size:12px;">Shuffle</button>
        <button class="btn toggle" id="loop" title="Loop playlist" style="width:auto; padding:0 12px; border-radius:18px; font-size:12px;">Loop</button>
        <button class="btn toggle" id="auto" title="Auto-switch effect each track" style="width:auto; padding:0 12px; border-radius:18px; font-size:12px;">Auto FX</button>
        <button class="btn" id="photos" title="Load images for the Photos effect" style="width:auto; padding:0 12px; border-radius:18px; font-size:12px;">Photos…</button>
        <button class="btn" id="fx" title="Next effect (E)" style="width:auto; padding:0 14px; border-radius:18px; font-size:12px; letter-spacing:0.4px;">
          <span id="fxName">Nebula</span>
        </button>
        <button class="btn" id="fs" title="Fullscreen (F)">
          <svg id="fsIcon" viewBox="0 0 24 24" fill="currentColor"><path d="M5 5h6V3H3v8h2V5zm14 0v6h2V3h-8v2h6zM5 19v-6H3v8h8v-2H5zm14-6v6h-6v2h8v-8h-2z"/></svg>
        </button>
      </div>
    </header>

    <div></div>

    <div style="display:grid; grid-template-columns: 1fr auto; gap: 12px; align-items: end;">
      <div class="playlist" id="playlist">
        <h3>Playlist</h3>
        <div class="empty" id="empty">No tracks yet — drop MP3s here.</div>
        <div id="tracks"></div>
      </div>

      <div class="player" style="min-width: min(560px, 60vw);">
        <div class="controls">
          <button class="btn" id="prev" title="Previous">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zM20 6 9 12l11 6V6z"/></svg>
          </button>
          <button class="btn play" id="play" title="Play/Pause">
            <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7L8 5z"/></svg>
          </button>
          <button class="btn" id="next" title="Next">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 6h2v12h-2zM4 6v12l11-6L4 6z"/></svg>
          </button>
        </div>

        <div class="scrub">
          <div class="time" id="cur">0:00</div>
          <input class="bar" id="seek" type="range" min="0" max="1000" value="0" step="1" />
          <div class="time right" id="dur">0:00</div>
        </div>

        <div class="right">
          <div class="now" id="now">—</div>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="color:var(--muted)">
            <path d="M3 10v4h4l5 5V5L7 10H3zm13.5 2A4.5 4.5 0 0 0 14 7.97v8.06A4.5 4.5 0 0 0 16.5 12z"/>
          </svg>
          <input class="bar vol" id="vol" type="range" min="0" max="100" value="85" />
        </div>
      </div>
    </div>
  </div>

  <input type="file" id="fileInput" accept="audio/mpeg,audio/mp3,.mp3" multiple style="display:none" />

  <!-- Howler.js handles AudioContext lifecycle, mobile/iOS unlock, and tab
       interruption recovery so we don't have to maintain ad-hoc patches. -->
  <script src="https://cdn.jsdelivr.net/npm/howler@2.2.4/dist/howler.min.js" crossorigin="anonymous"></script>
  <input type="file" id="imgInput" accept="image/*" multiple webkitdirectory style="display:none" />

  <div class="drop-overlay" id="drop">
    <div class="drop-card">Drop MP3s to add to playlist</div>
  </div>

<script type="module">
'use strict';

// ---------- WebGL Visualizer ----------
const canvas = document.getElementById('gl');
const gl = canvas.getContext('webgl', { antialias: false, premultipliedAlpha: false, alpha: false });
if (!gl) {
  document.body.innerHTML = '<p style="color:#fff;padding:24px">WebGL is not available in this browser.</p>';
  throw new Error('no webgl');
}

const VS = `
attribute vec2 aPos;
varying vec2 vUv;
void main() {
  vUv = aPos * 0.5 + 0.5;
  gl_Position = vec4(aPos, 0.0, 1.0);
}
`;

const FS_COMMON = `
precision highp float;
varying vec2 vUv;
uniform vec2  uRes;
uniform float uTime;
uniform float uBass;
uniform float uMid;
uniform float uHi;
uniform float uLevel;
uniform float uBeat;   // transient envelope (0..~1)
uniform float uBeatT;  // seconds since last beat
uniform float uPulse;  // monotonic clock that surges on beats
uniform sampler2D uSpec;

#define PI 3.14159265359

mat2 rot(float a){ float c=cos(a), s=sin(a); return mat2(c,-s,s,c); }
float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1,311.7))) * 43758.5453); }
float noise(vec2 p){
  vec2 i = floor(p), f = fract(p);
  float a = hash(i);
  float b = hash(i + vec2(1.0, 0.0));
  float c = hash(i + vec2(0.0, 1.0));
  float d = hash(i + vec2(1.0, 1.0));
  vec2 u = f*f*(3.0 - 2.0*f);
  return mix(a,b,u.x) + (c - a)*u.y*(1.0 - u.x) + (d - b)*u.x*u.y;
}
float fbm(vec2 p){
  float v = 0.0, amp = 0.5;
  for (int i=0;i<5;i++){ v += amp*noise(p); p = p*2.02 + 13.7; amp *= 0.5; }
  return v;
}
vec3 palette(float t, vec3 a, vec3 b, vec3 c, vec3 d){
  return a + b*cos(6.28318*(c*t + d));
}
`;

// ---- Nebula: FBM clouds + radial spectrum ring ----
const FS_NEBULA = FS_COMMON + `
void main(){
  vec2 uv = (gl_FragCoord.xy * 2.0 - uRes.xy) / min(uRes.x, uRes.y);
  float r = length(uv);
  float a = atan(uv.y, uv.x);
  float t = uTime * 0.08;
  vec2 q = uv * (1.4 + 0.5*uBass) + vec2(t, -t*0.6);
  q *= rot(0.2 + uMid*0.6);
  float n = fbm(q + fbm(q*1.7 + t));
  vec3 col = palette(n + uHi*0.3 + t,
    vec3(0.5,0.4,0.55), vec3(0.5,0.45,0.5), vec3(1.0), vec3(0.0,0.33,0.67));
  col *= 0.55 + 0.45 * smoothstep(1.4, 0.0, r);
  float idx = (a / (2.0*PI)) + 0.5;
  idx = mod(idx + uTime*0.02, 1.0);
  float spec = texture2D(uSpec, vec2(idx, 0.5)).r;
  float ringR = 0.42 + uBass*0.10;
  float bandWidth = 0.005 + spec*0.32 + uLevel*0.05;
  float ring = smoothstep(bandWidth, 0.0, abs(r - ringR));
  vec3 ringCol = palette(idx + uTime*0.05, vec3(0.6,0.5,0.55), vec3(0.5), vec3(1.0), vec3(0.0,0.15,0.30));
  col += ring * ringCol * (1.6 + 2.5*spec);
  float bars = smoothstep(ringR, ringR + 0.55*spec, r) * smoothstep(ringR + 0.6*spec, ringR, r);
  col += bars * ringCol * 0.6;
  float glow = exp(-6.0 * r) * (0.6 + 2.5 * uBass);
  col += glow * vec3(0.45, 0.85, 1.0);
  float spark = step(0.997, hash(floor(gl_FragCoord.xy * (1.0 + uHi*4.0)) + floor(uTime*30.0)));
  col += spark * vec3(1.0) * (0.3 + uHi);
  col *= smoothstep(1.6, 0.2, r);
  col += (hash(gl_FragCoord.xy + uTime) - 0.5) * 0.025;
  gl_FragColor = vec4(col, 1.0);
}
`;

// ---- Star Nest: ported from Pablo Roman Andrioli (Kali), Shadertoy XlfGRj ----
const FS_GALAXY = FS_COMMON + `
#define SN_ITERS    14
#define SN_VOLSTEPS 16

void main(){
  vec2 uv = gl_FragCoord.xy / uRes.xy - 0.5;
  uv.y *= uRes.y / uRes.x;

  float zoom       = 0.78 - uBass*0.04;
  float tile       = 0.85;
  float formuparam = 0.530 + uMid*0.02;
  float speed      = 0.0008;                     // very slow drift
  float brightness = 0.0015 + uBeat*0.0020;
  float darkmatter = 0.300;
  float distfading = 0.760;
  float saturation = 0.800 + uHi*0.15;

  vec3 dir = vec3(uv*zoom, 1.0);
  float t = uTime*speed + 0.25;

  // very gentle auto rotation
  float a1 = 0.5 + uTime*0.004;
  float a2 = 0.8 + uTime*0.003;
  mat2 r1 = rot(a1);
  mat2 r2 = rot(a2);
  dir.xz *= r1; dir.xy *= r2;
  vec3 from = vec3(1.0, 0.5, 0.5);
  from += vec3(t*0.5, t*0.3, -t*0.4);
  from.xz *= r1; from.xy *= r2;

  // volumetric rendering
  float s = 0.1, fade = 1.0;
  vec3 v = vec3(0.0);
  for (int r = 0; r < SN_VOLSTEPS; r++){
    vec3 p = from + s*dir*0.5;
    p = abs(vec3(tile) - mod(p, vec3(tile*2.0)));   // kaleidoscopic fold
    float pa = 0.0, a = 0.0;
    for (int i = 0; i < SN_ITERS; i++){
      p = abs(p)/dot(p,p) - formuparam;             // the magic formula
      a += abs(length(p) - pa);
      pa = length(p);
    }
    float dm = max(0.0, darkmatter - a*a*0.001);
    a = a*a*a;
    if (r > 3) fade *= 1.0 - dm;
    v += fade;
    v += vec3(s, s*s, s*s*s*s) * a * brightness * fade;
    fade *= distfading;
    s += 0.1;
  }
  v = mix(vec3(length(v)), v, saturation);
  vec3 col = v * 0.01;
  // beat flash + bass swell on top
  col *= 1.0 + uBass*0.3 + uBeat*0.6;
  gl_FragColor = vec4(col, 1.0);
}
`;
// ---- Synthwave: retro grid, sun, stars, spectrum mountains ----
const FS_SYNTHWAVE = FS_COMMON + `
// fade between four classic synthwave palettes
vec3 swA(float t){ // sky low (horizon)
  vec3 c0 = vec3(0.40, 0.06, 0.36); // miami magenta
  vec3 c1 = vec3(0.48, 0.18, 0.10); // sunset orange
  vec3 c2 = vec3(0.42, 0.10, 0.28); // pink/teal
  vec3 c3 = vec3(0.30, 0.05, 0.50); // neon purple
  float f = t*4.0;
  float k = fract(f);
  k = smoothstep(0.0, 1.0, k);
  int i = int(mod(f, 4.0));
  if (i==0) return mix(c0, c1, k);
  if (i==1) return mix(c1, c2, k);
  if (i==2) return mix(c2, c3, k);
  return mix(c3, c0, k);
}
vec3 swB(float t){ // sun top color
  vec3 c0 = vec3(1.0, 0.85, 0.25);
  vec3 c1 = vec3(1.0, 0.55, 0.20);
  vec3 c2 = vec3(1.0, 0.75, 0.85);
  vec3 c3 = vec3(0.85, 0.45, 1.0);
  float f = t*4.0;
  float k = smoothstep(0.0, 1.0, fract(f));
  int i = int(mod(f, 4.0));
  if (i==0) return mix(c0, c1, k);
  if (i==1) return mix(c1, c2, k);
  if (i==2) return mix(c2, c3, k);
  return mix(c3, c0, k);
}
vec3 swC(float t){ // sun bottom + grid near
  vec3 c0 = vec3(1.0, 0.25, 0.55);
  vec3 c1 = vec3(1.0, 0.30, 0.30);
  vec3 c2 = vec3(0.9,  0.30, 0.75);
  vec3 c3 = vec3(0.30, 0.55, 1.00);
  float f = t*4.0;
  float k = smoothstep(0.0, 1.0, fract(f));
  int i = int(mod(f, 4.0));
  if (i==0) return mix(c0, c1, k);
  if (i==1) return mix(c1, c2, k);
  if (i==2) return mix(c2, c3, k);
  return mix(c3, c0, k);
}
vec3 swD(float t){ // grid far
  vec3 c0 = vec3(0.20, 0.85, 1.00);
  vec3 c1 = vec3(1.00, 0.70, 0.30);
  vec3 c2 = vec3(0.45, 1.00, 0.80);
  vec3 c3 = vec3(1.00, 0.30, 0.70);
  float f = t*4.0;
  float k = smoothstep(0.0, 1.0, fract(f));
  int i = int(mod(f, 4.0));
  if (i==0) return mix(c0, c1, k);
  if (i==1) return mix(c1, c2, k);
  if (i==2) return mix(c2, c3, k);
  return mix(c3, c0, k);
}
void main(){
  vec2 p = (gl_FragCoord.xy * 2.0 - uRes.xy) / uRes.y;
  float ph = uTime * 0.025; // full cycle every ~40s
  vec3 cHorizon = swA(ph);
  vec3 cSunTop  = swB(ph);
  vec3 cSunBot  = swC(ph);
  vec3 cGridFar = swD(ph);
  vec3 cGridNear = cSunBot;
  // sky gradient
  float skyT = clamp(p.y*0.5 + 0.5, 0.0, 1.0);
  vec3 col = mix(
    mix(cHorizon, cHorizon*0.25, 1.0 - skyT),
    vec3(0.02,0.01,0.08),
    smoothstep(0.5, 1.0, skyT)
  );
  // sun
  vec2 sunC = vec2(0.0, 0.18 + uBass*0.04);
  float sunR = length(p - sunC);
  float sunMask = smoothstep(0.46, 0.43, sunR);
  float stripes = step(fract((p.y - sunC.y - uTime*0.15)*9.0), 0.55);
  float stripeMask = smoothstep(-0.05, 0.45, p.y - sunC.y);
  vec3 sunCol = mix(cSunTop, cSunBot, clamp((p.y-sunC.y)*1.5+0.5, 0.0, 1.0));
  col = mix(col, sunCol, sunMask * mix(1.0, stripes, stripeMask));
  col += sunCol * exp(-sunR*3.0) * (0.35 + 1.5*uBass) * 0.7;
  // upper-sky stars
  if (p.y > 0.0) {
    vec2 g = floor(gl_FragCoord.xy);
    float h = hash(g);
    float star = step(0.997, h) * (0.5 + 0.5*sin(uTime*3.0 + h*50.0));
    col += star * vec3(1.0,0.95,0.9) * (0.5 + uHi*1.5);
  }
  // spectrum analyzer bars on horizon
  {
    float aspect = uRes.x / uRes.y;
    float nx = (p.x / aspect) * 0.5 + 0.5;        // 0..1 across full screen
    float baseY = -0.05;
    float maxH = 0.55;
    float bars = 56.0;
    float bid = floor(nx * bars);
    float bcenter = (bid + 0.5) / bars;
    // log-ish freq mapping over the populated band only (skip empty top bins)
    float bn = clamp(bid/bars, 0.0, 1.0);
    float specIdx = pow(bn, 1.5) * 0.55 + bn * 0.05;
    float spec = pow(texture2D(uSpec, vec2(specIdx, 0.5)).r, 0.75);
    float h = baseY + spec * maxH + 0.02;
    float halfW = 0.5/bars;
    float gap   = halfW * 0.30;
    float inBarX = step(abs((nx - bcenter)), halfW - gap) * step(0.0, nx) * step(nx, 1.0);
    float inBarY = step(p.y, h) * step(baseY, p.y);
    // classic VU meter gradient: green -> yellow -> red
    float ty = clamp((p.y - baseY) / (h - baseY + 1e-4), 0.0, 1.0);
    vec3 grad = mix(vec3(0.10, 0.95, 0.20), vec3(1.0, 0.95, 0.10), smoothstep(0.0, 0.65, ty));
    grad = mix(grad, vec3(1.0, 0.18, 0.10), smoothstep(0.65, 1.0, ty));
    vec3 barCol = grad * (1.0 + 1.6*spec);
    col = mix(col, barCol, inBarX * inBarY);
    // top cap glow
    float cap = smoothstep(0.014, 0.0, abs(p.y - h)) * inBarX;
    col += cap * vec3(1.0,0.95,0.9) * (0.6 + uHi*1.5);
    // soft outer glow around each bar
    float halo = smoothstep(halfW*1.6, 0.0, abs(nx - bcenter)) * inBarY * step(0.0, nx) * step(nx, 1.0);
    col += halo * grad * spec * 0.35;
    // floor reflection just below horizon
    float reflY = (baseY - p.y);
    if (reflY > 0.0 && reflY < 0.18) {
      float reflH = baseY + spec*maxH*0.5;
      float inRefl = step(p.y, baseY) * step(baseY - 0.18, p.y) * inBarX
                   * step(p.y, baseY) * step(2.0*baseY - reflH, p.y);
      col += inRefl * grad * 0.25 * (1.0 - reflY/0.18);
    }
  }
  // grid floor
  if (p.y < -0.05) {
    float yy = -p.y;
    float z = 1.0 / yy;
    float x = p.x * z;
    float speed = (0.6 + uBass*2.0);
    float gx = abs(fract(x*0.5 + 0.5) - 0.5);
    float gz = abs(fract(z*0.6 - uTime*speed) - 0.5);
    float lx = smoothstep(0.04, 0.0, gx);
    float lz = smoothstep(0.04, 0.0, gz);
    float fade = exp(-z*0.06);
    vec3 gc = mix(cGridNear, cGridFar, clamp(z*0.05, 0.0, 1.0));
    float grid = max(lx, lz) * fade;
    col = mix(vec3(0.02,0.0,0.05), gc, grid * (0.7 + uMid));
    // horizon glow
    col += cGridNear * exp(-yy*8.0) * 0.4;
  }
  // film grain
  col += (hash(gl_FragCoord.xy + uTime) - 0.5) * 0.02;
  gl_FragColor = vec4(col, 1.0);
}
`;

// ---- Plasma Globe: ray-marched volumetric (after nimitz, Shadertoy XsjXRm) ----
const FS_PLASMA = FS_COMMON + `
#define NUM_RAYS  5
#define MAX_ITER  25
#define VOL_STEPS 12
#define FAR       6.0

float hash1(float n){ return fract(sin(n)*43758.5453); }

// cheap value 3D noise
float noise3(vec3 p){
  vec3 ip = floor(p);
  vec3 f  = fract(p);
  f = f*f*(3.0 - 2.0*f);
  float n = ip.x + ip.y*57.0 + ip.z*113.0;
  return mix(
    mix(mix(hash1(n), hash1(n+1.0), f.x),
        mix(hash1(n+57.0), hash1(n+58.0), f.x), f.y),
    mix(mix(hash1(n+113.0), hash1(n+114.0), f.x),
        mix(hash1(n+170.0), hash1(n+171.0), f.x), f.y),
    f.z);
}

const mat3 m3 = mat3(
   0.00,  0.80,  0.60,
  -0.80,  0.36, -0.48,
  -0.60, -0.48,  0.64
);

float flow3(vec3 p, float t){
  float z = 2.0, rz = 0.0;
  vec3 bp = p;
  for (int i = 0; i < 4; i++){
    p += t*0.1;
    rz += (sin(noise3(p + t*0.8)*6.0)*0.5 + 0.5) / z;
    p = mix(bp, p, 0.6);
    z *= 2.0;
    p *= 2.01;
    p = m3 * p;
  }
  return rz;
}

float sins(float x, float t){
  float rz = 0.0, z = 2.0;
  for (int i = 0; i < 3; i++){
    rz += abs(fract(x*1.4) - 0.5) / z;
    x *= 1.3;
    z *= 1.15;
    x -= t*0.65*z;
  }
  return rz;
}

float segm(vec3 p, vec3 a, vec3 b){
  vec3 pa = p - a;
  vec3 ba = b - a;
  float h = clamp(dot(pa, ba) / dot(ba, ba), 0.0, 1.0);
  return length(pa - ba*h) * 0.5;
}

vec3 boltPath(float i, float d, float t){
  vec3 en = vec3(0.0, 0.0, 1.0);
  float sns2 = sins(d + i*0.5, t)*0.22;
  float sns  = sins(d + i*0.6, t)*0.21;
  en.xz = rot((hash1(i*10.569) - 0.5)*6.2 + sns2) * en.xz;
  en.xy = rot((hash1(i*4.732 ) - 0.5)*6.2 + sns ) * en.xy;
  return en;
}

vec2 boltMap(vec3 p, float i, float t){
  float lp = length(p);
  vec3 en = boltPath(i, lp, t);
  float ins  = smoothstep(0.11, 0.46, lp);
  float outs = 0.15 + smoothstep(0.0, 0.15, abs(lp - 1.0));
  p *= ins*outs;
  float id = ins*outs;
  float rz = segm(p, vec3(0.0), en) - 0.011;
  return vec2(rz, id);
}

float boltMarch(vec3 ro, vec3 rd, float startf, float maxd, float j, float t){
  float h = 0.5;
  float d = startf;
  for (int i = 0; i < MAX_ITER; i++){
    if (abs(h) < 0.001 || d > maxd) break;
    d += h*1.2;
    h = boltMap(ro + rd*d, j, t).x;
  }
  return d;
}

vec3 boltVMarch(vec3 ro, vec3 rd, float j, vec3 orig, float t, float specBin){
  vec3 p = ro;
  vec3 sum = vec3(0.0);
  // tint the bolt slightly per spectrum bin
  vec3 tint = vec3(1.0, 0.85 + 0.15*specBin, 1.05 - 0.20*specBin);
  for (int i = 0; i < VOL_STEPS; i++){
    vec2 r = boltMap(p, j, t);
    p += rd * 0.03;
    float lp = length(p);
    vec3 col = sin(vec3(1.05, 2.5, 1.52)*3.94 + r.y) * 0.85 + 0.4;
    col *= smoothstep(0.0,  0.015, -r.x);
    col *= smoothstep(0.04, 0.20, abs(lp - 1.1));
    col *= smoothstep(0.10, 0.34, lp);
    sum += abs(col) * 5.0 * tint
         * (1.2 - noise3(vec3(lp*2.0 + j*13.0 + t*5.0)) * 1.1)
         / (log(distance(p, orig) - 2.0) + 0.75);
  }
  return sum;
}

vec2 iSphere2(vec3 ro, vec3 rd){
  vec3 oc = ro;
  float b = dot(oc, rd);
  float c = dot(oc, oc) - 1.0;
  float h = b*b - c;
  if (h < 0.0) return vec2(-1.0);
  return vec2(-b - sqrt(h), -b + sqrt(h));
}

void main(){
  float t = uTime * 0.35;                        // global animation slowdown
  vec2 p = (gl_FragCoord.xy - uRes.xy*0.5) / uRes.y;
  vec3 ro = vec3(0.0, 0.0, 5.0);
  vec3 rd = normalize(vec3(p*0.7, -1.5));
  // gentle auto-rotation
  float rotSpeed = 0.12 + uMid*0.10;
  mat2 mx = rot(t*rotSpeed);
  mat2 my = rot(t*0.10);
  ro.xz = mx*ro.xz; rd.xz = mx*rd.xz;
  ro.xy = my*ro.xy; rd.xy = my*rd.xy;
  vec3 bro = ro;
  vec3 brd = rd;

  vec3 col = vec3(0.0125, 0.0, 0.025);

  for (int j = 1; j <= NUM_RAYS; j++){
    float fj = float(j);
    ro = bro; rd = brd;
    mat2 mm = rot((t*0.1 + (fj + 1.0)*5.1) * fj * 0.25);
    ro.xy = mm*ro.xy; rd.xy = mm*rd.xy;
    ro.xz = mm*ro.xz; rd.xz = mm*rd.xz;
    float rz = boltMarch(ro, rd, 2.5, FAR, fj, t);
    if (rz < FAR){
      vec3 pos = ro + rz*rd;
      // each ray driven by a different spectrum bin
      float specBin = pow(texture2D(uSpec, vec2(fj/float(NUM_RAYS+1), 0.5)).r, 0.7);
      vec3 contrib = boltVMarch(pos, rd, fj, bro, t, specBin)
                     * (0.7 + 1.6*specBin + 1.5*uBeat*exp(-uBeatT*2.0));
      col = max(col, contrib);
    }
  }

  // sphere surface reflection (the iconic flowing plasma sheen)
  ro = bro; rd = brd;
  vec2 sph = iSphere2(ro, rd);
  if (sph.x > 0.0){
    vec3 pos  = ro + rd*sph.x;
    vec3 pos2 = ro + rd*sph.y;
    vec3 rf  = reflect(rd, pos);
    vec3 rf2 = reflect(rd, pos2);
    float nz  = -log(abs(flow3(rf *1.2,  t) - 0.01));
    float nz2 = -log(abs(flow3(rf2*1.2, -t) - 0.01));
    col += (0.10 * nz*nz  * vec3(0.12, 0.12, 0.50)
         + 0.05 * nz2*nz2 * vec3(0.55, 0.20, 0.55)) * 0.8
         * (1.0 + uBass*0.6);
    // beat flash on sphere surface
    col += vec3(0.5, 0.7, 1.0) * uBeat * 0.6;
  }

  // overall bass swell
  col *= 1.3 + uBass*0.4;
  gl_FragColor = vec4(col, 1.0);
}
`;

// ---- Photos: image slideshow with animated transitions and Ken Burns ----
const FS_PHOTOS = FS_COMMON + `
uniform sampler2D uTexA;
uniform sampler2D uTexB;
uniform float uMix;
uniform float uHasB;
uniform float uAspectA;
uniform float uAspectB;
uniform float uPhotoT;
uniform float uTransType;
uniform float uKenSeed;
uniform float uSlideDur;

// map screen uv [0,1] to image uv with cover-fit + Y flip + optional pan in
// pre-flip texture-space. (Textures are uploaded without UNPACK_FLIP_Y_WEBGL
// so we flip Y in the shader.) The pan vector is added BEFORE the flip and
// must satisfy |pan| <= (1 - sc) / 2 to stay within the image.
vec2 cover(vec2 uv, float imgAspect, vec2 pan) {
  float scrA = uRes.x / uRes.y;
  vec2 sc = vec2(1.0);
  if (imgAspect > scrA) sc.x = scrA / imgAspect;
  else                  sc.y = imgAspect / scrA;
  vec2 q = (uv - 0.5) * sc + 0.5 + pan;
  q.y = 1.0 - q.y;
  return q;
}

// Compute the auto Ken-Burns pan offset for the active slide. We slide the
// visible cover window from centered (pan=0) toward one edge so previously
// hidden parts of the image come into view across the slide. Direction is
// derived from uKenSeed so each slide moves differently.
vec2 kenPan(float imgAspect) {
  float scrA = uRes.x / uRes.y;
  vec2 sc = vec2(1.0);
  if (imgAspect > scrA) sc.x = scrA / imgAspect;
  else                  sc.y = imgAspect / scrA;
  vec2 budget = (1.0 - sc) * 0.5;       // how far we can shift before edges
  float prog  = clamp(uPhotoT / uSlideDur, 0.0, 1.0);
  float eased = smoothstep(0.0, 1.0, prog);
  float ang   = uKenSeed * 6.2831853;
  vec2 dir    = vec2(cos(ang), sin(ang));
  // start at centered (so it matches the inert cover used during transition)
  // and slide toward the chosen direction across the slide
  return eased * budget * dir;
}

vec3 sA(vec2 uv){ return texture2D(uTexA, cover(uv, uAspectA, kenPan(uAspectA))).rgb; }
vec3 sB(vec2 uv){ return texture2D(uTexB, cover(uv, uAspectB, vec2(0.0))).rgb; }

void main(){
  vec2 uv = gl_FragCoord.xy / uRes.xy;
  // images render at constant cover-fit; intra-slide motion was causing
  // visible size jumps so it's removed. Transitions still animate.
  vec2 uvA = uv;

  if (uHasB < 0.5) {
    vec3 col = sA(uvA);
    col *= 1.0 + uBeat*0.12;
    float r = length(uv - 0.5);
    col *= 1.0 - r*r*0.18;
    gl_FragColor = vec4(col, 1.0);
    return;
  }

  vec3 colA = sA(uvA);
  vec3 colB = sB(uv);
  vec3 col;
  float tt = floor(uTransType + 0.5);
  float m  = smoothstep(0.0, 1.0, uMix);

  if (tt < 0.5) {
    // 0: crossfade
    col = mix(colA, colB, m);
  } else if (tt < 1.5) {
    // 1: diagonal wipe with feather
    float diag = (uv.x + uv.y) * 0.5;
    float edge = uMix * 1.30 - 0.15;
    float w = smoothstep(edge, edge + 0.10, diag);
    col = mix(colB, colA, w);
  } else if (tt < 2.5) {
    // 2: pixel dissolve (chunky cells)
    vec2 cell = floor(gl_FragCoord.xy / 14.0);
    float th = hash(cell);
    col = (uMix > th) ? colB : colA;
  } else if (tt < 3.5) {
    // 3: radial wipe rotating around center
    vec2 v = uv - 0.5;
    float a = atan(v.y, v.x);
    float ang = (a + PI) / (2.0*PI);
    float w = smoothstep(uMix - 0.04, uMix + 0.04, ang);
    col = mix(colB, colA, w);
  } else if (tt < 4.5) {
    // 4: zoom-out A + zoom-in B
    float zA = 1.0 + m*0.50;
    float zB = 1.50 - m*0.50;
    vec3 a = sA((uvA - 0.5)/zA + 0.5);
    vec3 b = sB((uv  - 0.5)/zB + 0.5);
    col = mix(a, b, m);
  } else {
    // 5: ripple distortion fade
    float r = length(uv - 0.5);
    float ripple = sin(r*30.0 - uMix*30.0) * exp(-r*4.0) * (1.0 - uMix);
    vec2 d = (uv - 0.5)*(1.0 + ripple*0.06) + 0.5;
    vec3 a = sA(d);
    col = mix(a, colB, smoothstep(0.2, 0.95, uMix));
  }

  col *= 1.0 + uBeat*0.18;
  float r2 = length(uv - 0.5);
  col *= 1.0 - r2*r2*0.25;
  gl_FragColor = vec4(col, 1.0);
}
`;

    constructor(x, zStart, zBend, radius, yEnd){
      super(); this.x=x; this.zStart=zStart; this.zBend=zBend; this.radius=radius; this.yEnd=yEnd;
      this.L_flat = Math.abs(zStart - (zBend + radius));
      this.L_arc  = (Math.PI * radius) * 0.5;
      this.L_up   = Math.max(0.1, yEnd - radius);
      this.totalLength = this.L_flat + this.L_arc + this.L_up;
    }
    getPoint(t, target = new THREE.Vector3()){
      const d = t * this.totalLength;
      let py = 0, pz = 0;

        py = this.radius + (d - (this.L_flat + this.L_arc));

  const bloomPass   = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight),

  const blurShader = {

    },
    vertexShader: `varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.); }`,
    fragmentShader: `
      uniform sampler2D tDiffuse; uniform vec2 resolution; uniform float blurStrength;
      varying vec2 vUv;

        float mask = 1.0 - smoothstep(0.0, 0.35, vUv.y);

        else {

      precision highp float;

  });
  const skyPlane = new THREE.Mesh(new THREE.PlaneGeometry(1100, 520, 1, 1), skyMat);
  skyPlane.position.set(0, 82, -245);
  skyPlane.renderOrder = -20;

  const vertexShader = `
    varying vec2 vUv; varying vec3 vNormal; varying vec3 vViewPosition;
    void main(){
      vUv = uv;
      vNormal = normalMatrix * normal;
      vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);

    varying vec2 vUv; varying vec3 vNormal; varying vec3 vViewPosition;
    uniform float uTime; uniform vec3 uColor;
    uniform float uSpeed; uniform float uOffset; uniform float uTailLength;
    uniform float uIntensityMultiplier; uniform float uBendUv; uniform float uIsReflection;

    uniform float uBrightness; uniform float uDirection; uniform float uRhythm; uniform float uBeat;

      uOffset: { value: Math.random() },
      uTailLength: { value: Math.random() * 0.4 + 0.3 },
      uIntensityMultiplier: { value: 1.0 },
      uBendUv: { value: 0.0 },
      uIsReflection: { value: 0.0 },

      uDotSize: { value: cfg.dotSize },

  function updateGeometries(){

    const pos = floorGeo.attributes.position.array;
    for (let i = 0; i < pos.length; i += 3){
      if (pos[i + 2] < cfg.bendStartZ){
        let d = cfg.bendStartZ - pos[i + 2];
        let maxA = cfg.arcRadius * Math.PI * 0.5;
        if (d < maxA){
          let n = d / maxA;
          let a = (n * 0.4 + (n * n * (3.0 - 2.0 * n)) * 0.6) * (Math.PI * 0.5);
          pos[i + 1] = cfg.arcRadius * (1.0 - Math.cos(a));
          pos[i + 2] = cfg.bendStartZ - Math.sin(a) * cfg.arcRadius;

    ['#5a0a7a', '#c548ff', '#3a0857', '#4b0b6a', '#ffd84a'], // purple + yellow
    ['#073a55', '#1ed0b8', '#062a3c', '#08405e', '#ff6e3a'], // teal + coral
    ['#1a1a55', '#5a8cff', '#0d0d33', '#15154a', '#ff3a7a'], // indigo + magenta

          const refU = trailMaterials[i*2+1];

          refU.uRhythm.value = rhythm * 0.40 + noteAccent * 0.08;
          mainU.uBeat.value = hitAccent + noteAccent * 0.14;
          refU.uBeat.value = hitAccent * 0.30 + noteAccent * 0.06;
          mainU.uDotSize.value = cfg.dotSize * (0.92 + rhythm * 0.22 + hitAccent * 0.28 + noteAccent * 0.14 + hi * 0.06);
          refU.uDotSize.value = cfg.dotSize * (0.62 + rhythm * 0.12 + noteAccent * 0.06);
          mainU.uDotSpeed.value = cfg.dotSpeed * (0.70 + rhythm * 0.42 + speedAccent * 1.65 + hitAccent * 0.45 + noteAccent * 0.32);
          refU.uDotSpeed.value = cfg.dotSpeed * (0.62 + rhythm * 0.24 + speedAccent * 0.55 + noteAccent * 0.10);
          mainU.uBrightness.value = cfg.brightness * (0.24 + lv*0.22 + rhythm*0.38 + hitAccent*0.32 + noteAccent*0.08);
          refU.uBrightness.value = cfg.brightness * (0.12 + lv*0.10 + rhythm*0.16 + hitAccent*0.12 + noteAccent*0.03);
          mainU.uIntensityMultiplier.value = 0.70 + hitAccent*0.24 + noteAccent*0.05 + lv*0.06 + rhythm*0.22;

          const baseSpeed = trailObjects[i].baseSpeed;
          const lvShaped  = Math.pow(lv, 0.35);
          const overallShaped = Math.pow(overall, 0.45);
          const minFlowSpeed = baseSpeed * 0.13;
          const targetSpeed = baseSpeed * (0.070 + overallShaped * 0.14 + rhythm * 0.62 + speedAccent * 4.90 + hitAccent * 0.28 + noteAccent * 0.16 + lvShaped * 0.04);
          const kSpeed = targetSpeed > trailSpeeds[i] ? kSpeedUp : kSpeedDn;
          trailSpeeds[i] += (targetSpeed - trailSpeeds[i]) * kSpeed;
          trailPhases[i] += dt * Math.max(minFlowSpeed, trailSpeeds[i]) * 0.052;
          trailPhases[i] += speedHit * (0.026 + overall * 0.006) + beatRising * 0.010 + noteAccent * dt * 0.05;
          mainU.uTime.value = trailPhases[i];
          refU.uTime.value = trailPhases[i];
        }
      }
      composer.render();
    }
  };
  trailsLoading = false;
}

function compile(type, src) {
  const sh = gl.createShader(type);
  gl.shaderSource(sh, src);
  gl.compileShader(sh);
  if (!gl.getShaderParameter(sh, gl.COMPILE_STATUS)) {
    console.error(gl.getShaderInfoLog(sh), src);
    throw new Error('shader compile');
  }
  return sh;
}

const vsShader = compile(gl.VERTEX_SHADER, VS);
function buildProgram(fsSrc) {
  const p = gl.createProgram();
  gl.attachShader(p, vsShader);
  gl.attachShader(p, compile(gl.FRAGMENT_SHADER, fsSrc));
  gl.linkProgram(p);
  if (!gl.getProgramParameter(p, gl.LINK_STATUS)) {
    console.error(gl.getProgramInfoLog(p));
    throw new Error('link');
  }
  return {
    prog: p,
    aPos: gl.getAttribLocation(p, 'aPos'),
    uRes: gl.getUniformLocation(p, 'uRes'),
    uTime: gl.getUniformLocation(p, 'uTime'),
    uBass: gl.getUniformLocation(p, 'uBass'),
    uMid: gl.getUniformLocation(p, 'uMid'),
    uHi: gl.getUniformLocation(p, 'uHi'),
    uLevel: gl.getUniformLocation(p, 'uLevel'),
    uBeat: gl.getUniformLocation(p, 'uBeat'),
    uBeatT: gl.getUniformLocation(p, 'uBeatT'),
    uPulse: gl.getUniformLocation(p, 'uPulse'),
    uSpec: gl.getUniformLocation(p, 'uSpec'),
    uTexA: gl.getUniformLocation(p, 'uTexA'),
    uTexB: gl.getUniformLocation(p, 'uTexB'),
    uMix: gl.getUniformLocation(p, 'uMix'),
    uHasB: gl.getUniformLocation(p, 'uHasB'),
    uAspectA: gl.getUniformLocation(p, 'uAspectA'),
    uAspectB: gl.getUniformLocation(p, 'uAspectB'),
    uPhotoT: gl.getUniformLocation(p, 'uPhotoT'),
    uTransType: gl.getUniformLocation(p, 'uTransType'),
    uKenSeed: gl.getUniformLocation(p, 'uKenSeed'),
    uSlideDur: gl.getUniformLocation(p, 'uSlideDur'),
  };
}

const Photos = {
  list: [],         // { id, name, blob, image, tex, aspect }
  curIdx: -1,
  nextIdx: -1,
  mix: 0,
  phase: 'idle',    // 'idle' | 'fading'
  phaseT0: 0,
  slideStart: 0,
  transType: 0,
  kenSeed: Math.random(), // direction of the auto-pan for the current slide
  SLIDE_DUR: 8.0,   // seconds per slide (longer so the auto-pan reads as motion)
  TRANS_DUR: 1.6,   // seconds for the transition itself

  makeImage(blob) {
    return new Promise((res, rej) => {
      const img = new Image();
      img.onload  = () => res(img);
      img.onerror = rej;
      img.src = URL.createObjectURL(blob);
    });
  },

  makeTex(img) {
    const tex = gl.createTexture();
    gl.bindTexture(gl.TEXTURE_2D, tex);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, img);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
    return tex;
  },

  async addOne(rec) {
    try {
      const img = await this.makeImage(rec.blob);
      const tex = this.makeTex(img);
      this.list.push({
        id: rec.id, name: rec.name, path: rec.path || rec.name, blob: rec.blob,
        image: img, tex,
        aspect: img.naturalWidth / Math.max(1, img.naturalHeight),
      });
      // tick() initializes curIdx/slideStart on first call so all timestamps
      // share the render loop's time base (avoids a one-frame Ken-Burns jump)
    } catch (e) { console.warn('image load failed', rec && rec.name, e); }
  },

  async loadFiles(files) {
    const ok = /\.(jpe?g|png|webp|gif|bmp|avif)$/i;
    let added = 0;
    for (const f of files) {
      if (!ok.test(f.name) && !(f.type || '').startsWith('image/')) continue;
      const path = f.webkitRelativePath || f.name;
      let id = null;
      try { id = await idb.addImg({ name: f.name, path, blob: f }); } catch (e) { console.warn('img persist', e); }
      await this.addOne({ id, name: f.name, path, blob: f });
      added++;
    }
    return added;
  },

  async restore() {
    try {
      const recs = await idb.allImg();
      if (!recs || !recs.length) return;
      recs.sort((a, b) => a.id - b.id);
      for (const rec of recs) await this.addOne(rec);
    } catch (e) { console.warn('photos restore', e); }
  },

  async clear() {
    for (const p of this.list) try { gl.deleteTexture(p.tex); } catch {}
    this.list = [];
    this.curIdx = -1;
    this.nextIdx = -1;
    this.phase = 'idle';
    this.mix = 0;
    try { await idb.clearImg(); } catch {}
  },

  tick(t) {
    if (this.list.length === 0) return;
    // detect re-entry (tab refocus, effect switch back, etc) — if there has
    // been a >1s gap since the last tick, restart the current slide so Ken
    // Burns / transitions begin fresh instead of jumping to a stale offset
    if (this.lastTickT != null && (t - this.lastTickT) > 1.0) {
      this.slideStart = t;
      this.phase = 'idle';
      this.nextIdx = -1;
      this.mix = 0;
    }
    this.lastTickT = t;
    if (this.curIdx < 0) {
      this.curIdx = 0;
      this.slideStart = t;
      this.kenSeed = Math.random();
    }
    if (this.phase === 'idle') {
      if (this.list.length > 1 && (t - this.slideStart) > this.SLIDE_DUR) {
        this.nextIdx = (this.curIdx + 1) % this.list.length;
        this.transType = Math.floor(Math.random() * 6);
        this.phase = 'fading';
        this.phaseT0 = t;
        this.mix = 0;
      } else {
        this.mix = 0;
      }
    } else {
      const dt = t - this.phaseT0;
      this.mix = Math.min(1, dt / this.TRANS_DUR);
      if (dt >= this.TRANS_DUR) {
        this.curIdx = this.nextIdx;
        this.nextIdx = -1;
        this.phase = 'idle';
        this.slideStart = t;
        this.kenSeed = Math.random();   // fresh pan direction for the new slide
        this.mix = 0;
      }
    }
  },
};

// Backed by Howler.js, which handles AudioContext lifecycle, iOS / mobile
// audio unlock, and recovery from cross-tab audio interruptions. We splice
// our analyser into Howler's master output so the visualizer keeps working.
const Player = (() => {
  let current = null;       // active Howl instance
  let analyser = null;
  let analyserHooked = false;
  let pendingSrc = 0;
  let volume = 0.85;
  let pendingUrl = null;    // object URL of the active Howl, revoked on unload
  let onPlay = null, onPause = null, onEnded = null;

  function hookAnalyser() {
    if (analyserHooked) return;
    if (typeof Howler === 'undefined' || !Howler.ctx || !Howler.masterGain) return;
    analyser = Howler.ctx.createAnalyser();
    analyser.fftSize = 1024;
    analyser.smoothingTimeConstant = 0.82;
    // Splice analyser between Howler.masterGain and the destination.
    try { Howler.masterGain.disconnect(); } catch {}
    Howler.masterGain.connect(analyser);
    analyser.connect(Howler.ctx.destination);
    analyserHooked = true;
  }

  function unloadCurrent() {
    if (current) {
      try { current.off(); } catch {}
      try { current.unload(); } catch {}
      current = null;
    }
    if (pendingUrl) {
      try { URL.revokeObjectURL(pendingUrl); } catch {}
      pendingUrl = null;
    }
  }

  return {
    ensure() { /* Howler initialises lazily on first sound; nothing to do */ },
    get analyser() { return analyser; },
    get duration()    { return current ? (current.duration() || 0) : 0; },
    get currentTime() {
      if (!current) return 0;
      try { const v = current.seek(); return typeof v === 'number' ? v : 0; }
      catch { return 0; }
    },
    get paused()      { return !current || !current.playing(); },
    get hasBuffer()   { return !!current; },
    get state()       { return (typeof Howler !== 'undefined' && Howler.ctx) ? Howler.ctx.state : 'none'; },
    set onPlay(fn)    { onPlay  = fn; },
    set onPause(fn)   { onPause = fn; },
    set onEnded(fn)   { onEnded = fn; },

    setVolume(v) {
      volume = v;
      if (typeof Howler !== 'undefined') Howler.volume(v);
    },
    resumeCtx() {
      if (typeof Howler === 'undefined') return;
      if (Howler.ctx) { try { Howler.ctx.resume(); } catch {} }
    },
    hardResetSync() { unloadCurrent(); },  // Howler manages ctx itself

    loadBlob(blob) {
      const myId = ++pendingSrc;
      unloadCurrent();
      const url = URL.createObjectURL(blob);
      pendingUrl = url;
      return new Promise((resolve) => {
        const sound = new Howl({
          src: [url],
          format: ['mp3', 'mpeg'],
          html5: false,        // Web Audio path so the analyser sees the signal
          volume,
          onload() {
            if (myId !== pendingSrc) {
              try { sound.unload(); } catch {}
              try { URL.revokeObjectURL(url); } catch {}
              return resolve(null);
            }
            current = sound;
            hookAnalyser();
            resolve(sound.duration());
          },
          onloaderror(_id, err) {
            console.warn('Howl load error', err);
            try { URL.revokeObjectURL(url); } catch {}
            if (pendingUrl === url) pendingUrl = null;
            resolve(null);
          },
          onplay()  { if (onPlay)  onPlay();  },
          onpause() { if (onPause) onPause(); },
          onstop()  { if (onPause) onPause(); },
          onend()   { if (onEnded) onEnded(); },
        });
      });
    },

    play()  { if (current) { try { current.play(); } catch (e) { console.warn(e); } } },
    pause() { if (current) { try { current.pause(); } catch {} } },
    togglePlay() { if (this.paused) this.play(); else this.pause(); },
    seek(t) {
      if (!current) return;
      const d = current.duration();
      const tgt = Math.max(0, Math.min((d || 0) - 0.05, t));
      try { current.seek(tgt); } catch {}
    },
    stop() { unloadCurrent(); },
  };
})();

// ---- IndexedDB persistence for the playlist ----
const idb = (() => {
  let dbp;
  function open() {
    if (dbp) return dbp;
    dbp = new Promise((res, rej) => {
      const req = indexedDB.open('mvDB', 2);
      req.onupgradeneeded = () => {
        const db = req.result;
        if (!db.objectStoreNames.contains('tracks')) {
          db.createObjectStore('tracks', { keyPath: 'id', autoIncrement: true });
        }
        if (!db.objectStoreNames.contains('images')) {
          db.createObjectStore('images', { keyPath: 'id', autoIncrement: true });
        }
      };
      req.onsuccess = () => res(req.result);
      req.onerror   = () => rej(req.error);
    });
    return dbp;
  }
  const txOn = (storeName, mode, fn) => open().then(db => new Promise((res, rej) => {
    const t = db.transaction(storeName, mode);
    const store = t.objectStore(storeName);
    let result;
    Promise.resolve(fn(store)).then(r => { result = r; }, rej);
    t.oncomplete = () => res(result);
    t.onerror    = () => rej(t.error);
    t.onabort    = () => rej(t.error);
  }));
  const tx = (mode, fn) => txOn('tracks', mode, fn);
  return {
    add: (rec)  => tx('readwrite', s => new Promise((r, j) => { const q = s.add(rec); q.onsuccess = () => r(q.result); q.onerror = () => j(q.error); })),
    put: (rec)  => tx('readwrite', s => { s.put(rec); }),
    del: (id)   => tx('readwrite', s => { s.delete(id); }),
    get: (id)   => tx('readonly',  s => new Promise((r, j) => { const q = s.get(id); q.onsuccess = () => r(q.result); q.onerror = () => j(q.error); })),
    all: ()     => tx('readonly',  s => new Promise((r, j) => { const q = s.getAll(); q.onsuccess = () => r(q.result); q.onerror = () => j(q.error); })),
    addImg: (rec) => txOn('images', 'readwrite', s => new Promise((r, j) => { const q = s.add(rec); q.onsuccess = () => r(q.result); q.onerror = () => j(q.error); })),
    delImg: (id)  => txOn('images', 'readwrite', s => { s.delete(id); }),
    clearImg: ()  => txOn('images', 'readwrite', s => { s.clear(); }),
    allImg: ()    => txOn('images', 'readonly',  s => new Promise((r, j) => { const q = s.getAll(); q.onsuccess = () => r(q.result); q.onerror = () => j(q.error); })),
  };
})();

function decodeAudioBuffer(blob) {
  const AC = window.AudioContext || window.webkitAudioContext;
  const ctx = (typeof Howler !== 'undefined' && Howler.ctx) ? Howler.ctx : (AC ? new AC() : null);
  if (!ctx) return Promise.resolve(null);
  return blob.arrayBuffer().then(buf => new Promise((resolve) => {
    const copy = buf.slice(0);
    const done = (audioBuffer) => resolve(audioBuffer || null);
    const fail = () => resolve(null);
    try {
      const p = ctx.decodeAudioData(copy, done, fail);
      if (p && typeof p.then === 'function') p.then(done, fail);
    } catch {
      resolve(null);
    }
  }));
}

function estimateBeatMap(audioBuffer) {
  if (!audioBuffer || !audioBuffer.length || !audioBuffer.sampleRate) return null;
  const sr = audioBuffer.sampleRate;
  const ch0 = audioBuffer.getChannelData(0);
  const ch1 = audioBuffer.numberOfChannels > 1 ? audioBuffer.getChannelData(1) : null;
  const frameSize = 1024;
  const hop = 512;
  const frames = Math.max(0, Math.floor((audioBuffer.length - frameSize) / hop));
  if (frames < 64) return null;

  const onset = new Float32Array(frames);
  let slow = 0;
  let mean = 0;
  for (let f = 0; f < frames; f++) {
    const start = f * hop;
    let sum = 0, count = 0;
    for (let j = 0; j < frameSize; j += 4) {
      const idx = start + j;
      let v = ch0[idx] || 0;
      if (ch1) v = (v + (ch1[idx] || 0)) * 0.5;
      sum += v * v;
      count++;
    }
    const rms = Math.sqrt(sum / Math.max(1, count));
    slow += (rms - slow) * 0.012;
    const o = Math.max(0, rms - slow);
    onset[f] = o;
    mean += o;
  }
  mean /= frames;
  let variance = 0;
  for (let i = 0; i < frames; i++) variance += (onset[i] - mean) * (onset[i] - mean);
  const dev = Math.sqrt(variance / frames);
  const threshold = Math.max(mean + dev * 0.85, 0.004);
  const peaks = [];
  const minPeakGap = 0.19;
  for (let i = 2; i < frames - 2; i++) {
    const v = onset[i];
    if (v < threshold || v < onset[i - 1] || v < onset[i + 1]) continue;
    const time = i * hop / sr;
    const score = v;
    const last = peaks[peaks.length - 1];
    if (last && time - last.time < minPeakGap) {
      if (score > last.score) {
        last.time = time;
        last.score = score;
      }
    } else {
      peaks.push({ time, score });
    }
  }
  if (peaks.length < 8) return null;

  const minP = 0.30, maxP = 0.82, step = 0.01;
  const bins = new Float32Array(Math.floor((maxP - minP) / step) + 1);
  for (let i = 0; i < peaks.length; i++) {
    for (let j = i + 1; j < peaks.length; j++) {
      const d = peaks[j].time - peaks[i].time;
      if (d > 2.4) break;
      for (let div = 1; div <= 4; div++) {
        const p = d / div;
        if (p >= minP && p <= maxP) {
          const bi = Math.round((p - minP) / step);
          bins[bi] += Math.sqrt(peaks[i].score * peaks[j].score) / div;
        }
      }
    }
  }
  let bestBin = 0, bestScore = 0;
  for (let i = 0; i < bins.length; i++) {
    const score = bins[i];
    if (score > bestScore) {
      bestScore = score;
      bestBin = i;
    }
  }
  if (bestScore <= 0) return null;
  const period = minP + bestBin * step;
  const topPeaks = peaks.slice().sort((a, b) => b.score - a.score).slice(0, 64);
  const tol = Math.min(0.085, period * 0.18);
  let bestOffset = topPeaks[0].time % period;
  let bestOffsetScore = -1;
  for (const seed of topPeaks) {
    const offset = seed.time % period;
    let score = 0;
    for (const p of peaks) {
      let d = Math.abs(((p.time - offset + period * 0.5) % period) - period * 0.5);
      if (d < tol) score += p.score * (1 - d / tol);
    }
    if (score > bestOffsetScore) {
      bestOffsetScore = score;
      bestOffset = offset;
    }
  }

  const beats = [];
  let t = bestOffset;
  while (t > 0.05) t -= period;
  const dur = audioBuffer.duration || (audioBuffer.length / sr);
  for (; t < dur + period; t += period) {
    if (t < 0) continue;
    beats.push(t);
  }
  const confidence = Math.max(0, Math.min(1, bestOffsetScore / Math.max(0.001, peaks.length * threshold * 1.8)));
  return beats.length > 4 ? { beats, period, confidence } : null;
}

function ensureBeatMap(track, blob) {
  if (track.beatMap || track.beatMapPromise) return;
  track.beatMapPromise = decodeAudioBuffer(blob)
    .then(estimateBeatMap)
    .then(map => { track.beatMap = map; return map; })
    .catch(() => null);
}

function activeBeatMap() {
  const track = tracks[current];
  return track && track.beatMap && track.beatMap.beats && track.beatMap.beats.length > 4 ? track.beatMap : null;
}

function beatMapPhaseAt(currentTime) {
  const map = activeBeatMap();
  if (!map) return null;
  const beats = map.beats;
  const nextIndex = lowerBound(beats, currentTime);
  const prevBeat = nextIndex > 0 ? beats[nextIndex - 1] : -Infinity;
  const nextBeat = nextIndex < beats.length ? beats[nextIndex] : Infinity;
  const nearest = (currentTime - prevBeat) <= (nextBeat - currentTime) ? prevBeat : nextBeat;
  const distance = Math.abs(currentTime - nearest);
  const period = map.period || 0.48;
  const window = Math.min(0.18, Math.max(0.075, period * 0.30));
  const closeness = Math.max(0, 1 - distance / window);
  return {
    closeness,
    distance,
    period,
    confidence: map.confidence || 0.4
  };
}

function addFiles(files) {
  const added = [];
  for (const f of files) {
    const isMp3 = /\.mp3$/i.test(f.name) || f.type === 'audio/mpeg' || f.type === 'audio/mp3';
    if (!isMp3) continue;
    const url = URL.createObjectURL(f);
    const t = { id: null, name: f.name.replace(/\.mp3$/i, ''), url, dur: 0, blob: f, liked: false };
    tracks.push(t);
    added.push(t);
    // persist to IDB; assign id when known
    idb.add({ name: t.name, dur: 0, blob: f, liked: false }).then(id => {
      t.id = id;
    }).catch(err => console.warn('persist failed', err));
  }
  if (added.length) {
    welcome.classList.add('hidden');
    renderPlaylist();
    if (current === -1) playIndex(tracks.length - added.length);
  }
}

function toggleLike(i) {

  }

}

function removeTrack(i) {
  const wasCurrent = i === current;
  URL.revokeObjectURL(tracks[i].url);
  if (tracks[i].id != null) idb.del(tracks[i].id).catch(() => {});
  tracks.splice(i, 1);
  if (wasCurrent) {
    Player.stop();
    if (tracks.length) {
      current = -1;
      const next = Math.min(i, tracks.length - 1);
      playIndex(next);
    } else {
      current = -1;
      nowEl.textContent = '—';
    }
  } else if (i < current) {
    current--;
  }
  renderPlaylist();
}

async function playIndex(i) {
  if (i < 0 || i >= tracks.length) return;
  const wasDifferent = current !== i;
  current = i;
  const t = tracks[i];
  if (wasDifferent) {
    beatMapTrack = -1;
    beatMapCursor = 0;
    beatMapLastTime = 0;
    beatT = 999;
    beatEnv = 0;
    beatConfidence = 0;
  }
  // If a previous ctx got wedged (another tab grabbed audio focus, OS
  // interrupted us), recreate it synchronously inside the click stack so
  // the immediately-following resumeCtx can lift it to 'running'.
  if (Player.state === 'interrupted' || Player.state === 'closed') {
    Player.hardResetSync();
  }
  Player.resumeCtx();
  nowEl.textContent = t.name;
  if (autoSwitchFx && wasDifferent) {
    let next = curEffect;
    if (programs.length > 1) {
      while (next === curEffect) next = Math.floor(Math.random() * programs.length);
    }
    useEffect(next);
  }
  renderPlaylist();
  // re-fetch a fresh blob from IDB before decoding. Safari's IDB-backed Blob
  // references can go stale across page loads (WebKitBlobResource error 1 →
  // decodeAudioData NotFoundError); a fresh read from the store always works.
  let blob = t.blob;
  if (t.id != null) {
    try {
      const fresh = await idb.get(t.id);
      if (fresh && fresh.blob) {
        blob = fresh.blob;
        t.blob = fresh.blob;
      }
    } catch (e) { /* fall back to in-memory blob */ }
  }
  if (current !== i) return;
  ensureBeatMap(t, blob);
  // decode + play asynchronously (the only reliable way for VBR MP3 blobs)
  const dur = await Player.loadBlob(blob);
  if (current !== i) return; // user switched while decoding
  if (dur != null && dur > 0 && (!t.dur || Math.abs(t.dur - dur) > 0.5)) {
    t.dur = dur;
    if (t.id != null) {
      idb.put({ id: t.id, name: t.name, dur: t.dur, blob: t.blob, liked: t.liked }).catch(() => {});
    }
    renderPlaylist();
  }
  durEl.textContent = fmtTime(Player.duration);
  primeTrackReactivity();
  Player.play();
}

function togglePlay() {
  if (current === -1) {
    if (tracks.length) playIndex(0);
    return;
  }
  if (Player.state === 'interrupted' || Player.state === 'closed') {
    Player.hardResetSync();
    playIndex(current);
    return;
  }
  Player.resumeCtx();
  if (!Player.hasBuffer) {
    playIndex(current);
    return;
  }
  Player.togglePlay();
}

function pickNext(dir) {
  if (!tracks.length) return -1;
  if (shufflePlay && tracks.length > 1) {
    let n = current;
    while (n === current) n = Math.floor(Math.random() * tracks.length);
    return n;
  }
  const n = current + dir;

  if (n < 0) return loopPlaylist ? tracks.length - 1 : -1;
  return n;
}

let prevBass = 0, prevMid = 0, prevHi = 0, prevLevel = 0, fastBass = 0, fastMid = 0, fastHi = 0, fastLevel = 0;
let rmsFast = 0, rmsSlow = 0;
let melodyFast = 0, melodySlow = 0;
let beatEnv = 0, beatT = 999, pulseClock = 0, pulseVel = 0, lastFrameT = performance.now();
let beatSpecPrev = null, fluxSlow = 0, onsetAvg = 0, onsetDev = 0, drumAvg = 0, drumDev = 0, beatPeriod = 0.48, beatConfidence = 0;
let startupBoost = 0, startupSeedFrames = 0;
const start = performance.now();

function downsampleSpec(src, dst) {
  // src: analyser frequencyBinCount values, dst: 256
  const ratio = src.length / dst.length;
  for (let i = 0; i < dst.length; i++) {
    const s0 = Math.floor(i * ratio);
    const s1 = Math.floor((i + 1) * ratio);
    let m = 0;
    for (let j = s0; j < s1; j++) if (src[j] > m) m = src[j];
    dst[i] = m;
  }
}

function primeTrackReactivity() {
  smoothBass = 0;
  smoothMid = 0;
  smoothHi = 0;
  smoothLevel = 0;
  prevBass = prevMid = prevHi = prevLevel = 0;
  fastBass = fastMid = fastHi = fastLevel = 0;
  rmsFast = rmsSlow = 0;
  melodyFast = melodySlow = 0;
  beatEnv = Math.max(beatEnv, 0.22);
  beatT = 999;
  pulseVel = Math.max(pulseVel, 1.8);
  lastFrameT = performance.now();
  beatSpecPrev = null;
  fluxSlow = 0;
  onsetAvg = 0.006;
  onsetDev = 0.006;
  drumAvg = 0.004;
  drumDev = 0.004;
  startupBoost = 1;
  startupSeedFrames = 14;
  if (trailsApi && typeof trailsApi.prime === 'function') trailsApi.prime();
}

function frame() {

  // UI tick: progress bar + current-time label (replaces audio.timeupdate)

    const ct = Player.currentTime;
    const d  = Player.duration;
    curEl.textContent = fmtTime(ct);
    if (d > 0) seekEl.value = Math.round((ct / d) * 1000);
  }
  let bass = 0, mid = 0, hi = 0, level = 0, spectralFlux = 0, waveRms = 0;
  let melodicPeak = 0, melodicEnergy = 0, melodicContrast = 0;
  const analyser = Player.analyser;
  if (analyser) {
    const targetSmoothing = EFFECTS[curEffect].external === 'trails' ? 0.34 : 0.82;
    if (Math.abs(analyser.smoothingTimeConstant - targetSmoothing) > 0.001) {
      analyser.smoothingTimeConstant = targetSmoothing;
    }
    if (!freqData || freqData.length !== analyser.frequencyBinCount) {
      freqData = new Uint8Array(analyser.frequencyBinCount);
    }
    if (!timeData || timeData.length !== analyser.fftSize) {
      timeData = new Uint8Array(analyser.fftSize);
    }
    analyser.getByteFrequencyData(freqData);
    analyser.getByteTimeDomainData(timeData);
    let waveSum = 0;
    for (let i = 0; i < timeData.length; i++){
      const v = (timeData[i] - 128) / 128;
      waveSum += v * v;
    }
    waveRms = Math.sqrt(waveSum / Math.max(1, timeData.length));
    const N = freqData.length;
    const bEnd = Math.floor(N * 0.08);
    const mEnd = Math.floor(N * 0.35);
    let bs = 0, ms = 0, hs = 0;
    for (let i = 0; i < bEnd; i++) bs += freqData[i];
    for (let i = bEnd; i < mEnd; i++) ms += freqData[i];
    for (let i = mEnd; i < N; i++) hs += freqData[i];
    bass = (bs / (bEnd * 255)) || 0;
    mid = (ms / ((mEnd - bEnd) * 255)) || 0;
    hi = (hs / ((N - mEnd) * 255)) || 0;

    const guitarStart = Math.max(2, Math.floor(N * 0.016));
    const guitarEnd = Math.max(guitarStart + 1, Math.min(N, Math.floor(N * 0.36)));
    let gSum = 0, gCount = 0, gTop1 = 0, gTop2 = 0, gTop3 = 0, gTop4 = 0;

    melodicPeak * 1.45 +
    melodicContrast * 2.10 +

  );
  let instrumentAccent = Math.max(midTransient * 2.0, hiTransient * 4.0, fluxTransient * 3.6);
  instrumentAccent = Math.max(0, instrumentAccent - Math.max(0.0025, onsetAvg * 0.45));
  instrumentAccent = Math.min(1, instrumentAccent / Math.max(0.010, onsetDev * 1.15 + 0.004));
  const drumDominant = bass > mid * 1.55 && drumTransient > drumThreshold * 1.25 && melodicPeak < 0.18;
  instrumentAccent = Math.max(instrumentAccent, melodicSustain * (drumDominant ? 0.55 : 1.08));
  if (mid < 0.014 && hi < 0.008 && melodicPeak < 0.06 && spectralFlux < 0.005 && melodyFast < 0.012) instrumentAccent = 0;
  const hasEnergy = level > 0.035 || waveRms > 0.032;
  const percussiveSupport =
    bassTransient > Math.max(0.0014, drumThreshold * 0.16) ||
    (levelTransient + rmsTransient) > Math.max(0.0028, drumThreshold * 0.34);
  const beatPhase = beatMapPhaseAt(Player.currentTime);
  const usingBeatMap = !!beatPhase;
  const phaseCloseness = usingBeatMap ? beatPhase.closeness : 0;
  const canDetect = beatT > (usingBeatMap ? Math.max(0.105, beatPhase.period * 0.30) : Math.max(0.145, beatPeriod * 0.36));
  const phaseAllowsBeat = !usingBeatMap || phaseCloseness > 0.16 || drumTransient > drumThreshold * 1.55;
  const mappedLiveBeat = usingBeatMap && hasEnergy && percussiveSupport && canDetect && phaseAllowsBeat &&
    drumTransient > drumThreshold * (0.92 - phaseCloseness * 0.34);
  const onGridWindow = !usingBeatMap && beatConfidence > 0.35 && beatT > beatPeriod * 0.68 && beatT < beatPeriod * 1.42;
  const detectedBeat = !usingBeatMap && transient > beatThreshold && hasEnergy && percussiveSupport && (canDetect || onGridWindow);
  const predictedBeat = !usingBeatMap && beatConfidence > 0.40 && beatT >= beatPeriod * 0.985 &&
    beatT < beatPeriod * 1.55 && hasEnergy && percussiveSupport && transient > beatThreshold * 0.68;
  if (mappedLiveBeat || detectedBeat || predictedBeat) {
    const interval = beatT;
    if (detectedBeat && interval > 0.24 && interval < 1.05) {
      const periodErr = interval - beatPeriod;
      beatPeriod += periodErr * (beatConfidence > 0.45 ? 0.18 : 0.32);
      beatPeriod = Math.max(0.28, Math.min(0.82, beatPeriod));
      beatConfidence = Math.min(1, beatConfidence + 0.24);
    } else if (predictedBeat) {
      beatConfidence = Math.max(0, beatConfidence * 0.96 - 0.015);
    }
    const normalized = usingBeatMap
      ? Math.max(0, drumTransient - drumThreshold * 0.62) / Math.max(0.008, drumDev + 0.004)
      : Math.max(0, transient - beatThreshold) / Math.max(0.01, onsetDev + 0.006);
    const energyStrength = Math.min(0.26, level * 1.20 + waveRms * 0.45);
    const phaseBoost = usingBeatMap ? phaseCloseness * 0.18 : beatConfidence * 0.08;
    const strength = predictedBeat
      ? Math.min(0.52, 0.30 + energyStrength + phaseBoost)
      : Math.min(1.0, 0.36 + normalized * 0.32 + energyStrength + phaseBoost);
    beatHit = strength;
    beatEnv = Math.max(beatEnv, strength);
    pulseVel += strength * 6.0;
    beatT = 0;
  } else if (!usingBeatMap && beatT > beatPeriod * 1.75) {
    beatConfidence *= 0.94;
  }
  // smooth velocity-driven pulse: motion ramps and tails over ~150ms
  pulseVel *= Math.pow(0.0005, dt);    // fast velocity decay
  pulseClock += pulseVel * dt;

  const warmStart = startupBoost;
  startupBoost *= Math.pow(0.10, dt);
  if (startupBoost < 0.01) startupBoost = 0;
  const drumSpeedCue = hasEnergy && percussiveSupport
    ? Math.min(1, Math.max(0, drumTransient - drumThreshold * 0.74) / Math.max(0.010, drumDev + 0.005) * 0.58 + phaseCloseness * 0.10)
    : 0;
  const speedCue = Math.min(1, Math.max(beatHit, drumSpeedCue > 0.46 ? drumSpeedCue * 0.78 : 0, warmStart * 0.22));

  const t = (performance.now() - start) / 1000;
  if (EFFECTS[curEffect].external === 'trails') {
    const renderBeat = Math.max(beatEnv, warmStart * 0.16);
    const renderHit = Math.max(beatHit, warmStart * 0.12);
    if (trailsApi) trailsApi.render(dt, smoothBass, smoothMid, smoothHi, renderBeat, renderHit, instrumentAccent, speedCue);
    requestAnimationFrame(frame);
    return;
  }
  const e = programs[curEffect];
  gl.uniform2f(e.uRes, canvas.width, canvas.height);
  gl.uniform1f(e.uTime, t);
  gl.uniform1f(e.uBass, smoothBass);
  gl.uniform1f(e.uMid, smoothMid);
  gl.uniform1f(e.uHi, smoothHi);
  gl.uniform1f(e.uLevel, smoothLevel);
  gl.uniform1f(e.uBeat, beatEnv);
  gl.uniform1f(e.uBeatT, beatT);
  gl.uniform1f(e.uPulse, pulseClock);

  // Photos effect: bind current/next image textures and drive transitions
  if (EFFECTS[curEffect].name === 'Photos' && e.uTexA) {
    Photos.tick(t);
    if (Photos.list.length && Photos.curIdx >= 0) {
      const cur = Photos.list[Photos.curIdx];
      const pathEl = document.getElementById('imgPath');
      const nextText = cur.path || cur.name || '';
      if (pathEl && pathEl.textContent !== nextText) pathEl.textContent = nextText;
      gl.activeTexture(gl.TEXTURE1);
      gl.bindTexture(gl.TEXTURE_2D, cur.tex);
      gl.uniform1i(e.uTexA, 1);
      gl.uniform1f(e.uAspectA, cur.aspect);
      if (Photos.phase === 'fading' && Photos.nextIdx >= 0) {
        const nxt = Photos.list[Photos.nextIdx];
        gl.activeTexture(gl.TEXTURE2);
        gl.bindTexture(gl.TEXTURE_2D, nxt.tex);
        gl.uniform1i(e.uTexB, 2);
        gl.uniform1f(e.uAspectB, nxt.aspect);
        gl.uniform1f(e.uMix, Photos.mix);
        gl.uniform1f(e.uHasB, 1.0);
      } else {
        // bind a placeholder to uTexB anyway so the sampler is valid
        gl.activeTexture(gl.TEXTURE2);
        gl.bindTexture(gl.TEXTURE_2D, cur.tex);
        gl.uniform1i(e.uTexB, 2);
        gl.uniform1f(e.uAspectB, cur.aspect);
        gl.uniform1f(e.uMix, 0.0);
        gl.uniform1f(e.uHasB, 0.0);
      }
      gl.uniform1f(e.uPhotoT, t - Photos.slideStart);
      gl.uniform1f(e.uTransType, Photos.transType);
      gl.uniform1f(e.uKenSeed, Photos.kenSeed);
      gl.uniform1f(e.uSlideDur, Photos.SLIDE_DUR);
    } else {
      gl.uniform1f(e.uHasB, 0.0);
      gl.uniform1f(e.uMix, 0.0);
    }
    // restore active texture for the spectrum sampler
    gl.activeTexture(gl.TEXTURE0);
  }

  gl.drawArrays(gl.TRIANGLES, 0, 6);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
